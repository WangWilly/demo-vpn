<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN 技術探索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'JetBrains Mono', 'Segoe UI', sans-serif;
            background-color: #0b1120;
            color: #f8fafc;
            min-height: 100vh;
        }

        .cyber-border {
            position: relative;
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(45deg, #3b82f6, #10b981);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-hover {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.35);
        }

        .data-stream {
            background-image: linear-gradient(90deg, transparent 50%, rgba(255,255,255,0.04) 50%);
            background-size: 20px 100%;
            animation: streamData 1.5s linear infinite;
        }
        @keyframes streamData {
            0%   { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.7);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-start py-16 px-4">

    <!-- Header -->
    <header class="mb-14 text-center">
        <div class="flex items-center justify-center gap-3 mb-4">
            <!-- Shield icon (inline SVG) -->
            <svg class="w-12 h-12 text-blue-400" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
                <polyline points="9 12 11 14 15 10"/>
            </svg>
            <h1 class="text-5xl font-bold tracking-wide glow-text text-blue-300">VPN 技術探索</h1>
        </div>
        <p class="text-slate-400 text-lg max-w-xl mx-auto">
            深入了解 VPN 的原理、加密機制與進階防偵測技術
        </p>
    </header>

    <!-- Cards grid -->
    <main class="grid gap-8 w-full max-w-5xl sm:grid-cols-1 md:grid-cols-3">

        <!-- Card 1 -->
        <a href="vpn-basic-impl.html"
           class="cyber-border card-hover rounded-xl bg-slate-900 p-6 flex flex-col gap-4 no-underline">
            <div class="data-stream rounded-md h-2 mb-2"></div>
            <div class="flex items-center gap-3">
                <!-- Network icon -->
                <svg class="w-8 h-8 text-emerald-400 shrink-0" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8"/><path d="M12 17v4"/>
                    <path d="M7 8h10M7 12h6"/>
                </svg>
                <h2 class="text-xl font-semibold text-emerald-300">VPN 是怎麼實現的？</h2>
            </div>
            <p class="text-slate-400 text-sm leading-relaxed flex-1">
                從封包封裝、隧道建立到資料傳輸，圖解 VPN 的基本實作流程與核心概念。
            </p>
            <span class="mt-auto text-emerald-400 text-sm font-mono flex items-center gap-1">
                探索 →
            </span>
        </a>

        <!-- Card 2 -->
        <a href="vpn-type.html"
           class="cyber-border card-hover rounded-xl bg-slate-900 p-6 flex flex-col gap-4 no-underline">
            <div class="data-stream rounded-md h-2 mb-2"></div>
            <div class="flex items-center gap-3">
                <!-- Lock icon -->
                <svg class="w-8 h-8 text-blue-400 shrink-0" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <circle cx="12" cy="16" r="1" fill="currentColor"/>
                </svg>
                <h2 class="text-xl font-semibold text-blue-300">VPN 底層技術與加密解析</h2>
            </div>
            <p class="text-slate-400 text-sm leading-relaxed flex-1">
                深入剖析各種 VPN 協議（OpenVPN、WireGuard、IPSec…）的加密原理與效能比較。
            </p>
            <span class="mt-auto text-blue-400 text-sm font-mono flex items-center gap-1">
                探索 →
            </span>
        </a>

        <!-- Card 3 -->
        <a href="advanced-dpi.html"
           class="cyber-border card-hover rounded-xl bg-slate-900 p-6 flex flex-col gap-4 no-underline">
            <div class="data-stream rounded-md h-2 mb-2"></div>
            <div class="flex items-center gap-3">
                <!-- Eye-off / firewall icon -->
                <svg class="w-8 h-8 text-rose-400 shrink-0" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C7 20 2.73 16.39 1 12c.78-2.03 2.12-3.83 3.82-5.18"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c5 0 9.27 3.61 11 8-.29.76-.68 1.47-1.14 2.13"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <h2 class="text-xl font-semibold text-rose-300">VPN 偽裝與防火牆檢測</h2>
            </div>
            <p class="text-slate-400 text-sm leading-relaxed flex-1">
                了解深度封包檢測（DPI）如何識別 VPN 流量，以及混淆技術如何繞過封鎖。
            </p>
            <span class="mt-auto text-rose-400 text-sm font-mono flex items-center gap-1">
                探索 →
            </span>
        </a>

    </main>

    <!-- Footer -->
    <footer class="mt-20 text-slate-600 text-sm text-center">
        <p>VPN Demo &copy; 2025 &mdash; 僅供學習用途</p>
    </footer>

</body>
</html>
