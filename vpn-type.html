<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN 底層技術與加密解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'JetBrains Mono', 'Segoe UI', sans-serif; background-color: #0b1120; color: #f8fafc; }
        .data-stream { background-image: linear-gradient(90deg, transparent 50%, rgba(255,255,255,0.1) 50%); background-size: 20px 100%; animation: streamData 1s linear infinite; }
        @keyframes streamData { 0% { background-position: 0 0; } 100% { background-position: 20px 0; } }
        .packet-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .7; transform: scale(1.05); } }
        .cyber-border { position: relative; }
        .cyber-border::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 2px; background: linear-gradient(45deg, #3b82f6, #10b981); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVGs ---
        const ShieldIcon = () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const LockIcon = () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const NetworkIcon = () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
        const HackerIcon = () => <svg className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/><line x1="2" y1="2" x2="22" y2="22" stroke="red" strokeWidth="2" strokeOpacity="0.7"/></svg>;
        const WifiIcon = () => <svg className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>;

        const App = () => {
            const [vpnActive, setVpnActive] = useState(true);
            const [packetStep, setPacketStep] = useState(0); // 0: Raw, 1: Encrypted, 2: Encapsulated

            // Auto advance packet steps for demo
            useEffect(() => {
                let timer;
                if (packetStep < 2) {
                    timer = setTimeout(() => setPacketStep(p => p + 1), 2000);
                } else {
                    timer = setTimeout(() => setPacketStep(0), 4000);
                }
                return () => clearTimeout(timer);
            }, [packetStep]);

            return (
                <div className="min-h-screen bg-[#0b1120] text-slate-300 p-4 md:p-8 font-sans">
                    <div className="max-w-6xl mx-auto space-y-12">
                        
                        {/* Header */}
                        <header className="text-center space-y-4 pt-8">
                            <h1 className="text-3xl md:text-5xl font-bold text-white tracking-tight">
                                VPN 底層運作：<span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">封裝與加密</span>
                            </h1>
                            <p className="text-slate-400 max-w-2xl mx-auto text-lg">
                                不是只有「換 IP」這麼簡單。VPN 透過密碼學與網路協定，在公開的網際網路上建立一條堅不可摧的虛擬隧道。
                            </p>
                        </header>

                        {/* Section 1: How it works - The Packet Level */}
                        <section className="cyber-border bg-[#0f172a] rounded-2xl p-6 md:p-10 shadow-2xl">
                            <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                <NetworkIcon /> 步驟拆解：VPN 封包是如何誕生的？
                            </h2>
                            <p className="mb-8 text-slate-400">
                                當您打開 VPN，您的作業系統會建立一個虛擬網卡 (Virtual Network Interface)。所有的應用程式數據都會先送到這裡進行「加工」，然後才送往實體網卡 (Wi-Fi 晶片等)。
                            </p>

                            <div className="space-y-6">
                                {/* Step 0: Raw Data */}
                                <div className={`transition-all duration-500 p-4 rounded-xl border ${packetStep === 0 ? 'bg-slate-800 border-blue-500 scale-[1.02] shadow-[0_0_20px_rgba(59,130,246,0.3)]' : 'bg-slate-900 border-slate-700 opacity-60'}`}>
                                    <h3 className="text-blue-400 font-bold mb-2 flex justify-between">
                                        <span>Step 1: 原始數據 (應用層產生)</span>
                                        {packetStep === 0 && <span className="text-xs bg-blue-500 text-white px-2 py-1 rounded animate-pulse">Processing...</span>}
                                    </h3>
                                    <div className="flex bg-slate-950 rounded border border-slate-700 overflow-hidden text-sm">
                                        <div className="bg-orange-900/50 text-orange-200 p-3 border-r border-slate-700 flex-shrink-0 w-32">
                                            <div className="text-xs opacity-50">原始 IP 標頭</div>
                                            <div>目的地: 銀行IP</div>
                                        </div>
                                        <div className="p-3 text-slate-300 w-full font-mono overflow-hidden whitespace-nowrap text-ellipsis">
                                            GET /login HTTP/1.1<br/>Password: MySecret123
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-500 mt-2">這是您的瀏覽器準備送出的數據。如果此時被攔截，密碼和目的地一覽無遺。</p>
                                </div>

                                {/* Step 1: Encryption */}
                                <div className={`transition-all duration-500 p-4 rounded-xl border ${packetStep === 1 ? 'bg-slate-800 border-green-500 scale-[1.02] shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'bg-slate-900 border-slate-700 opacity-60'}`}>
                                    <h3 className="text-green-400 font-bold mb-2 flex justify-between">
                                        <span>Step 2: 對稱加密 (AES-256 / ChaCha20)</span>
                                        {packetStep === 1 && <span className="text-xs bg-green-500 text-white px-2 py-1 rounded animate-pulse">Encrypting...</span>}
                                    </h3>
                                    <div className="flex bg-slate-950 rounded border border-slate-700 overflow-hidden text-sm relative">
                                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiMxZTI5M2IiLz48cmVjdCB3aWR0aD0iMSIgaGVpZ2h0PSIxIiBmaWxsPSIjMzM0MTU1Ii8+PC9zdmc+')] opacity-20 pointer-events-none"></div>
                                        <div className="bg-green-900/50 text-green-300 p-3 w-full font-mono break-all flex items-center justify-center gap-2">
                                            <LockIcon /> 
                                            <span>0x8F4C2A9B7E... (已加密的原始 IP 標頭 + 數據)</span>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-500 mt-2">VPN 客戶端使用與伺服器協商好的密鑰，將整個原始封包變成亂碼。即使駭客拿到，以目前的電腦算力需要數十億年才能破解。</p>
                                </div>

                                {/* Step 2: Encapsulation */}
                                <div className={`transition-all duration-500 p-4 rounded-xl border ${packetStep === 2 ? 'bg-slate-800 border-cyan-500 scale-[1.02] shadow-[0_0_20px_rgba(6,182,212,0.3)]' : 'bg-slate-900 border-slate-700 opacity-60'}`}>
                                    <h3 className="text-cyan-400 font-bold mb-2 flex justify-between">
                                        <span>Step 3: 隧道封裝 (Encapsulation)</span>
                                        {packetStep === 2 && <span className="text-xs bg-cyan-500 text-white px-2 py-1 rounded animate-pulse">Routing...</span>}
                                    </h3>
                                    <div className="flex bg-slate-950 rounded border border-slate-700 overflow-hidden text-sm">
                                        <div className="bg-cyan-900/50 text-cyan-200 p-3 border-r border-slate-700 flex-shrink-0 w-32">
                                            <div className="text-xs opacity-50">新 IP 標頭 (外部)</div>
                                            <div>目的地: VPN伺服器</div>
                                        </div>
                                        <div className="bg-green-900/30 text-green-500/50 p-3 w-full font-mono truncate">
                                            [加密的負載...]
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-500 mt-2">因為被加密的數據無法在網路上路由，VPN 會在外面「再包裝一層」新的信封。這個信封的目的地寫著 VPN 伺服器的 IP。這就是所謂的「隧道 (Tunnel)」。</p>
                                </div>
                            </div>
                        </section>

                        {/* Section 2: The Wi-Fi Eavesdropping Scenario */}
                        <section className="bg-slate-900 rounded-2xl p-6 md:p-10 border border-slate-800">
                            <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                                <div>
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-3">
                                        <WifiIcon /> 公共 Wi-Fi 竊聽模擬
                                    </h2>
                                    <p className="text-sm text-slate-400 mt-1">
                                        駭客開啟「混雜模式 (Promiscuous Mode)」，利用 Wireshark 抓取空氣中傳輸的所有電波。
                                    </p>
                                </div>
                                <div className="flex items-center gap-3 bg-slate-950 p-2 rounded-lg border border-slate-700">
                                    <span className="text-sm font-bold text-slate-300">啟動 VPN 防護</span>
                                    <button 
                                        onClick={() => setVpnActive(!vpnActive)}
                                        className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${vpnActive ? 'bg-green-500' : 'bg-slate-600'}`}
                                    >
                                        <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${vpnActive ? 'translate-x-6' : 'translate-x-1'}`} />
                                    </button>
                                </div>
                            </div>

                            <div className="relative h-64 bg-slate-950 rounded-xl border border-slate-800 overflow-hidden flex items-center justify-between px-4 md:px-16">
                                {/* Flow lines */}
                                <div className="absolute inset-0 top-1/2 -translate-y-1/2 h-1 w-full flex">
                                    <div className="w-1/2 h-full data-stream"></div>
                                    <div className="w-1/2 h-full data-stream"></div>
                                </div>

                                {/* Nodes */}
                                <div className="z-10 bg-slate-800 p-4 rounded-xl border border-slate-600 text-center">
                                    <span className="block text-2xl mb-1">💻</span>
                                    <span className="text-xs">您的筆電</span>
                                </div>

                                {/* Hacker in the middle */}
                                <div className="z-10 flex flex-col items-center">
                                    <div className="relative">
                                        <div className="bg-red-900/30 p-3 rounded-full border border-red-500/50 mb-2">
                                            <span className="block text-3xl">🦹‍♂️</span>
                                        </div>
                                        {/* Sniffed Data Popup */}
                                        <div className={`absolute top-full mt-2 left-1/2 -translate-x-1/2 w-48 p-2 rounded border text-xs font-mono shadow-2xl transition-all duration-300
                                            ${vpnActive ? 'bg-slate-800 border-green-500 text-green-400' : 'bg-red-950 border-red-500 text-red-200'}`}>
                                            <div className="font-bold border-b border-white/10 mb-1 pb-1">駭客擷取到的封包：</div>
                                            {vpnActive ? (
                                                <>
                                                    <div>目標 IP: <span className="text-slate-400">VPN 伺服器</span></div>
                                                    <div>內容: <span className="opacity-50">g&8jK!2pO@x...</span></div>
                                                    <div className="text-green-500 mt-1 flex items-center gap-1"><LockIcon /> 無法解密</div>
                                                </>
                                            ) : (
                                                <>
                                                    <div>目標 IP: <span className="text-red-400 font-bold">銀行網站</span></div>
                                                    <div>內容: <span className="text-white">PWD=MySecret</span></div>
                                                    <div className="text-red-400 mt-1">🚨 密碼已外洩</div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <span className="text-xs mt-1 text-red-400 font-bold bg-red-950/50 px-2 rounded">同網段監聽者</span>
                                </div>

                                <div className="z-10 bg-slate-800 p-4 rounded-xl border border-slate-600 text-center">
                                    <span className="block text-2xl mb-1">📡</span>
                                    <span className="text-xs">咖啡廳 Router</span>
                                </div>
                            </div>
                            
                            <div className="mt-8 p-4 bg-slate-800/50 rounded-lg text-sm text-slate-300 leading-relaxed border border-slate-700">
                                <strong>💡 為什麼 Wi-Fi 密碼保護不夠？</strong><br/>
                                即使咖啡廳的 Wi-Fi 有密碼 (WPA2)，一旦您連上網路，您和駭客就處於「同一個區域網路」。使用 ARP 欺騙 (ARP Spoofing) 等技術，駭客可以輕易讓您的設備誤以為他的電腦是路由器，進而攔截您的所有封包。
                                <br/><br/>
                                <strong>🛡️ VPN 的防禦機制：</strong><br/>
                                開啟 VPN 後，所有離開您電腦的封包都已經在本地端（您的作業系統內）被高強度加密。駭客攔截到的只是一坨**加密後的封裝資料**。他們既看不到您在瀏覽什麼網站（因為真實目標 IP 被封裝在內部），也看不到傳輸內容。
                            </div>
                        </section>

                        {/* Section 3: Tech Specs */}
                        <section className="grid md:grid-cols-3 gap-6">
                            <div className="bg-[#1e293b] p-6 rounded-xl border border-slate-700">
                                <h3 className="text-lg font-bold text-white mb-3 text-blue-400">連線協定 (Protocols)</h3>
                                <p className="text-sm text-slate-400 mb-4">決定 VPN 隧道如何建立、驗證與傳輸數據的規則。</p>
                                <ul className="text-sm space-y-2 text-slate-300">
                                    <li><strong className="text-white">WireGuard:</strong> 最新一代協定，程式碼極簡（僅約 4000 行），連線速度極快，加密現代化，是目前的業界標準。</li>
                                    <li><strong className="text-white">OpenVPN:</strong> 歷史最悠久、最成熟的開源協定，高度可配置，能偽裝成一般 HTTPS 流量繞過防火牆。</li>
                                    <li><strong className="text-white">IKEv2/IPsec:</strong> 在行動裝置上表現極佳，當網路切換（如 Wi-Fi 切換到 5G）時能快速重連。</li>
                                </ul>
                            </div>

                            <div className="bg-[#1e293b] p-6 rounded-xl border border-slate-700">
                                <h3 className="text-lg font-bold text-white mb-3 text-green-400">加密演算法 (Ciphers)</h3>
                                <p className="text-sm text-slate-400 mb-4">負責將您的資料轉換成亂碼的數學公式。</p>
                                <ul className="text-sm space-y-2 text-slate-300">
                                    <li><strong className="text-white">AES-256:</strong> 高級加密標準，256位元密鑰。被美國政府與軍方廣泛採用。要暴力破解它，需要耗費比宇宙年齡還長的時間。</li>
                                    <li><strong className="text-white">ChaCha20:</strong> 一種較新的流加密演算法，在沒有硬體 AES 加速的設備（如舊手機或低階路由器）上，速度比 AES 快且同樣安全。</li>
                                </ul>
                            </div>

                            <div className="bg-[#1e293b] p-6 rounded-xl border border-slate-700">
                                <h3 className="text-lg font-bold text-white mb-3 text-purple-400">密鑰交換 (Key Exchange)</h3>
                                <p className="text-sm text-slate-400 mb-4">兩台素未謀面的電腦，如何在網路上安全地取得同一把「對稱加密鑰匙」。</p>
                                <ul className="text-sm space-y-2 text-slate-300">
                                    <li><strong className="text-white">Diffie-Hellman (DH):</strong> 一種非對稱加密技術。透過數學公式，您的電腦和 VPN 伺服器各自產生公鑰和私鑰，交換公鑰後，雙方能計算出相同的「共享密鑰」，而竊聽者無法計算出來。</li>
                                    <li><strong className="text-white">PFS (完美前向機密):</strong> 每次連線（或每隔幾分鐘）都重新產生一次密鑰。即使未來的某把密鑰被盜，駭客也無法解密過去攔截的歷史數據。</li>
                                </ul>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
